body:
  text: 兩同書卷上唐羅隱撰貴賤第一夫一氣所化陽尊而隂卑三才肇分天髙而地下龜龍為鱗介之長麟鳯處羽毛之宗金玉乃土石之標芝松則卉木之秀此乃貴賤之理著之於自然也龜龍有神靈之别麟鳯有仁愛之異金玉有鑑潤之竒芝松有貞秀之姿是皆性禀殊致為衆物之所重也然則萬物之中唯人為貴人不自理必有所尊亦以明聖之才而居億兆之上也是故時之所賢者則貴之以為君長才不應代者則賤之以為黎庶然處君長之位非不貴矣雖蒞力有餘而無德可稱則其貴不足貴也居黎庶之內非不賤矣雖貧弱不足而有道可採則其賤未為賤也何以言之昔者殷紂居九五之位孔邱則魯國之逐臣也齊景有千駟之饒伯夷則首陽之餓士也此非不尊卑道阻飛伏理殊然而百代人君競慕丘夷之義三尺童子羞聞紂景之名是以貴賤之途未可以窮逹論也故夫人主所以稱尊者以其有德也茍無其德則何以異于萬物乎是故明君者納陛軫處旰食興懷勞十起而無疲聽八音而受諌蓋有由矣且崆峒髙卧黃軒致順風之請潁水幽居帝堯發時雨之讓夫以鰥夫獨善之操猶降萬乘之尊况天子厚載之恩而為百姓所薄者哉蓋不患無位而患德之不修也不憂其賤而憂道之不篤也易曰聖人之大寶曰位何以守位曰仁茍無其仁亦何能守位乎是以古之人君乾乾而夕惕豈徒為名而已哉實恐墜聖人之大寶辱先生之餘慶也故貴者榮也非有道而不能居賤者辱也雖有力而不能避也茍以修德不求其貴而貴自求之茍以不仁欲離其賤而賤不離之故昔虞舜處於側陋非不微矣而鼎祚肇建終有揖讓之美夏桀親御神器非不盛矣而萬姓莫輔竟罹放逐之辱古公避賤而遷居豈求其貴也行未輟策邑城岐下胡亥笑堯禹之陋豈樂其賤也死不旋踵地分灞上夫以虞舜之微非有榖帛之利以悅於衆也夏桀之盛非無戈㦸之防以禦於敵也古公之興非以一人之力自強於家國也胡亥之滅非以萬乘之尊願同於黔首也貴者愈賤賤者愈貴求之者不得得之者不求豈皇天之有私惟德佑之而已矣故老氏曰道尊德貴其是之謂乎強弱第二夫強不自強因弱以奉強弱不自弱因強以禦弱故弱為強者所伏強為弱者所宗上下相制自然之理也然則所謂強者豈壯勇之謂耶所謂弱者豈怯懦之謂耶蓋在乎有德不在乎多力也何以言之夫金者天下之至剛也水者天下之至柔也金雖剛矣折之而不可以續水雖柔矣斬之而不可以斷則水柔能成其剛金剛不輟其弱也故晏嬰之侏儒耳齊國之宰臣甘羅之童子耳秦國之良相僑如大人也魯人樁其喉矣長萬壯士也宋華醢其肉矣晏嬰身短不過人此非不懦矣甘羅年未弱冠此非不幼矣僑如大可専車此非不壯矣長萬力能抉革此非不勇矣然則僑如長萬智不足以全身晏嬰甘羅謀可以制一國豈非德力有異強弱不同者歟由是乾以健剛終有亢極之悔謙以卑下能成光大之尊則其致也然夫所謂德者何唯慈唯仁矣所謂力者何且暴且武耳茍以仁慈則天地所不違鬼神將來舍而况於邇乎茍以暴武則九族所離心六親所側目而况於逺乎是故德者兆庶之所賴也力者一夫之所持也矜一夫之用故不可得其強乘兆庶之恩故不可得其弱是以紂能索鐡天下懼之如虎狼堯不勝衣天下親之如父母然虎狼雖使人懼之豈可言虎狼強於人耶父母能令子親之豈可言父母弱於子耶則強弱之理固亦明矣是以古之明君道濟天下知衆心不可以力制大名不可以暴成故盛德以自修柔仁以禦下用能不言而信洽垂拱以化行將乃八極歸成四方重譯豈徒一邦從服百姓與能而已哉嗟乎古之暴君驕酷天下捨德而任力忘己而責人壯可行舟不能自制其嗜欲材堪舉鼎不足自全其性靈至令社稷為墟宗廟無主永為後代所笑豈獨當時之弱乎悲夫老氏曰勝人者有力自勝者強其是之謂乎損益第三夫萬姓所賴在乎一人一人所安資乎萬姓則萬姓為天下之足一人為天下之首也然則萬姓衆矣不能免塗炭之禍一人尊矣不能逃放戮之辱豈失之於足實在於元首也夫以水動萍移風行草偃處唐虞之代則比屋可封居桀紂之朝則比屋可戮夫天下者豈賢於彼而愚於此易於上而難於下哉蓋人君有所損益也然則益莫大於主儉損莫大於君奢奢儉之間乃損益之本也且夫日月者天下之至明也然猶有不及之處爾其儉主之理則天下無為天下無為則萬姓受其賜其於日月亦已大矣豺狼者天下之至害也然猶有不傷之所爾其奢君之理則天下多事天下多事則萬姓受其毒其於豺狼亦已甚矣是故古先聖君務修儉德土階茅宇綈衣粗裘捨難得之貨掊無用之器薄賦斂省徭役損一人之愛好益萬人之性命故得天下歡娛各悅其生矣古先暴主志在奢淫瑶臺象狀錦衣玉食購難得之貨斫無用之器厚賦斂煩徭役益一人之愛好損萬人之性命故使天下困窮不畏其死矣夫死且不畏豈可畏其亂乎生且是悅豈不悅其安乎故人安者天子所以得其安也人亂者天子所以罹其亂也人主欲其己安而不念其人安恐其人亂而不思其己亂此不可謂其智也且夫剖腹啖口不足謂其美也溫踵動心不足謂其勞也夫心口所以存者為其踵腹也腹之且剖豈異口之剖耶踵之且溫豈異心之溫耶故人主所以稱至尊者徒以有其人也人且共益則君孰與其損哉人且共損則君孰與其益哉是故損己以益物者物既益矣而物亦益之堯舜所以成其上聖克保耆頥之夀也益己以損物者物既損矣而物亦損之癸辛所以陷其下愚自取誅逐之敗也是則彼之自損者豈非自益之道歟此之自益者豈非自損之道歟損益之途固亦明矣嗟夫性命者至重之理也愛好者不急之事也今我捨一身之不急濟萬姓之至重不言所利廣遂生成永居南嶽之安常有北辰之政則普天率土孰為我損乎夫以嗜欲無厭貪求莫止士饑糟糗犬馬餘其粟肉人衣皮毛土水榮其錦罽崇虛喪實捨利取危枳棘生於梗途鯨鯢遊於沸海則九州四域孰為益乎故老氏曰天之道損有餘補不足其是之謂歟敬慢第四逺古之代人心混沌不殊於草木取類於羽毛後代聖人乃道之以禮樂教之以仁義然後君臣貴賤之制坦然有章矣然則禮之所先莫大乎敬禮之所弊莫甚於慢故以敬事天則神降以敬理國則人和以慢事天則神欺以慢理國則人殆下之不敬則不足以奉君上之不敬則不足以御臣是以地中有山大易發謙尊之㫖海下於水老氏著谷王之喻相鼠有體風詩刺其失儀飛鳥能言古人記其無禮則敬慢之間美惡殊致是故明主之於天下也設壇授將側席求賢賁束帛於丘園降安車於途巷故得真龍就位振鷺來庭天下榮之願從其化也昧主之於天下也披裳接士露髮朝人視賢良若草芥比黎庶為豕畜是以白駒投谷飛鴻逝雲天下惡之願逃其恥也然夫敬人者不必自賤蓋欲用其人也慢人者不必增貴適足怨其人也何以言之昔文侯式干木之閭昭王築郭隗之館故得羣才必至駿足攸歸何則以敬之所致也齊桓有葵丘之驕漢祖輕過趙之罵故有諸侯不附大臣構迍何則以慢之所致也然夫向之所敬者豈徒敬人而已哉蓋以自敬也向之所慢者豈徒慢人而已哉蓋以自慢也故敬一人則千萬人悅慢一人則千萬人怨皆欲知好人之敬而不知行其所以敬皆欲知惡人之慢而不知去其所以慢此猶南望以求燕北行以適越誠有不可得也且夫人主者天下之表也行書國䇿言記史官有一善若慶雲之浮輝天下之所欣賀有一惡若朝日之帶蝕天下之所傷嗟不可類於匹夫不慎其敬慢也故人問田子方曰富貴者驕人貧賤者驕人乎子方曰諸侯而驕人則失其國大夫而驕人則失其家貧賤者行不合道言不合同則去之楚越若脫敝屣奈何同之是以虎豹墜谷頓為韲粉螻蟻隨風無傷絲髮輕重之理不同年而語也故周公文王之子握吐為勞馭者晏嬰之僕驕矜自若豈非君子小人之道敬慢殊途者乎夫尺蠖求伸亦因其屈鷙鳥將擊必先以卑以貴下賤大得人也故老氏曰後其身而身先其是之謂歟厚薄第五夫大德曰生至貴唯命故兩臂重於四海萬物少於一身雖禀精神於天地託質氣於父母然亦因於所飬以遂其天理也且夫松柏者有凌雲之操也若壅之以糞壤沃之以鹹流則不及崇朝已見其憔悴矣氷雪者無逾時之堅也若藏之於隂井庇之於幽峰則茍涉盛夏未聞其消解也夫松柏之性非不貞矣終以速朽氷雪之性非不液矣竟以遐延此二者豈天使之然哉果以飬之所致也况夫人者異乎松柏之永矣飬之失其所則安可以不朽乎豈徒氷雪之倐忽也飬之得其道則安可以不延乎故夀之有長短由飬之有厚薄也悲夫飲食男女者人之大欲存焉人皆莫不欲其自厚而不知其厚所以薄也人皆莫不惡其為薄而不知薄之所以厚也何以言之昔信陵孝惠為縱長夜之娛淫酒色之樂極情肆志此非不自厚也然卒逢大折之痛自殞於泉壠之下是則為薄亦已甚矣老氏彭公修延年之方遵火食之禁拘魂制魄此非不自薄矣然克保長久之夀自致於雲霄之上是則為厚亦已大矣夫外物者飬生之具也茍以飬過其度則亦為喪生之源也是故火之所宜者膏也木之所宜者水也今以江湖之水清其尺蘖斛庾之膏沃其星燭則必見壞滅也故性命之分誠有限也嗜欲之心固無窮也以有限之性命逐無窮之嗜欲亦安可不困苦哉是以易存飲食之節禮誡男女之際蓋有由矣且夫居九五之尊此天下之至貴也有億兆之衆此天下之至富也茍以飬生之不存則五臟四支猶非我有而况身形之外安可有乎夫美玉投蛙明珠彈雀捨所貴而求所賤人即以為惑矣今以至尊性命之重而自輕於嗜欲之下豈得為不惑乎是故土能濁河而不能濁海風能拔木而不能拔山嗜欲者適足以亂小人不足以動君子故魯仲尼渴而遇盜泉之水義而不飲鄭子公則染指以求羮栁下惠與女子同寢終不為亂宋華父則危身以竊色周公遺酒誥之㫖殷紂沈湎而致亡媫妤辭同輦之嫌姜氏遜淫而無耻豈非貞濫有異厚薄不同者與夫神大用則竭形大用則勞神形俱困而求長生者未之聞也為人主者誠能內寶神氣外損嗜欲念馳騁之誡宗頥飬之言永保神仙之夀常為聖明之主豈不休哉故老氏曰外其身而身存其是之謂乎兩同書卷上
