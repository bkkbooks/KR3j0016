  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0016_WYG_002-1a, image: WYG0849/WYG0849-0221a.png}
body:
  text: 兩同書卷下唐羅隠撰理亂第六夫家國之理亂在乎文武之道也昔者聖人之造書契以通隠情剡弓矢以威不伏二者古今之所存焉然則文以致理武以定亂文雖致理不必止其亂武雖定亂不必適其理故防亂在乎用武勸理在乎用文若手足之遞使舟車之更載也是以漢祖矜功陸賈諭以為學魯公赴㑹仲尼請其設備蓋有由也然夫文者道之以徳徳在乎内誠不在乎誇飾者也武者示之以威威在乎自全不在乎強名也茍以強名則吳雖多利兵適足彰其敗也茍以誇飾則魯雖盡儒服不足救其弱也是故始皇築長城修戰伐勞役不休人不堪命遂使陳渉之流坐乘其弊禍起於強名也王莽構靈臺興禮樂賦歛無度人不聊生遂使聖公之徒行收其利敗始於虚飾也故始皇用武於天下也若陶者之埏器雖務欲求其大而不知薄者之所以反脆也王莽用文於天下也若匠者之斵材雖志在矜其妙而不知細者之所以速折也二者皆以理之終以為亂也此未得其大體也且夫文者示人有章必存乎簡易簡易則易從将有恥且格武者示人有備必在乎恬淡恬淡則自守恒以逸而待勞恒以逸而待勞則攻戰無不利有恥且格則教化無不行化行而衆和戰利而宼息然後澄之以無事濡之以至仁此聖主所以得其理也然二子不求之於内而索之於外不撫之以性而縱之以情煩文以黷下暴武以困衆此不可得意於天下也雖然猶有其弊何者昔伯益鑿井燧人鑚木水火之利于今頼之然智伯因之以灌趙城董卓因之以焚漢室是乃為害亦以甚矣然則文武者理國之利器也而盜竊者亦何嘗不以文武之道亂天下乎故章邯以軍旅而分秦地田常以仁義而簒齊國則有理不能無其亂唯人主之所制也是故牧馬者先去其害驅羊者亟鞭其後後之不鞭羊之所失也害之不去馬之所亡也魯不能去三家之害國之所叛也晉不能鞭六卿之後地之所分也茍亦不能則雖有簡易之文恬淡之武適足助其亂也安可得其理乎故聖人不得文武之道不理賊臣不得文武之道不亂非文武有去就之私蓋人主失其柄也故孔子曰天下有道禮樂征伐自天子出其是之謂乎得失第七夫騊駼騁逺必以四足之力鸑鷟翔遐莫非六翮之用也是以聖人撫運明主乘時亦以杞梓之材而為股肱之任然則地有山川其險可見天有冬夏其時可知至於凡人之心杳然無所素王以之不測帝堯猶以為難将欲用之不無得失也何以言之夫君者舟也臣者水也水能浮舟亦能覆舟臣能輔君亦能危君是以三傑用而漢興六卿強而晉滅陶朱在而越霸田氏盛而齊亡雖任是同而成敗尤異也夫人者姦宄無端真偽匪一或貌㳟而心慢或言親而行違或賤㢘而貴貪或貧貞而富黷或愆大以求變或位髙而自疑或見利而忘恩或逃刑而搆隙此則蓍筮不足決鬼神不能定且利器者至重也人心者難知也以至重之利器假難知之人心未明真偽之情徒信毁譽之口有霍光之才者亦以得矣有王莽之行者亦以失矣是故考之於宗親則管叔周公不無忠僻驗之於戚屬則竇嬰呂祿不無正邪推之於功臣則王陵黥布不無逆順論之於故友則樊噲盧綰不無去留取以刀筆之能則若張湯之欺誑賞以頰舌之用則厭主父偃之倒行若智策有餘則陳平不可獨任若英謀出衆則韓信慮其難制夫天下之至大也無其人則不可獨守有其人則又恐為亂亦何不取其才而不制其亂也且夫毛髪植於頭也日以櫛之𤓰甲冠於指也月以鑢之𤓰之不鑢長則不便於使也髪之不櫛久則彌成於亂也夫𤓰甲毛髪者近在已躬本無情識茍不以理猶為之難况於臣下非同體之物人心有易遷之慮委之以臧否隨之以是非蓋不可以容易也是故逐長路者必在於駿馬之力理天下者必求於賢臣之用然駿馬茍馴由不可以無轡也賢臣雖任終不可以失權也故夫御馬者其轡煩則其馬蹀而不進其轡縱則其馬驕而好逸使夫縱不至逸煩而每進者唯造父之所能也夫御臣者其權峻則其臣懼而不安其權寛則其臣慢而好亂使夫寛而不至亂峻而能安者唯聖人之所明也恐馬之多逸捨馬而徒行則長路不可濟也懼臣之為亂捨臣而獨任則天下莫能理也知馬之可乘而不執其轡則不能禁其逸也知臣之可用而不親其權則不能止其亂也是故項羽不用范増是捨馬而徒行漢帝雖有曹操是乘馬而無轡茍欲不敗其可得乎故孔子曰唯名與器不可以假於人其是之謂歟真偽第八夫主上不能獨化也必資賢輔物心不為易治也方俟甄議使夫小人退野君子居朝然後可為得矣然則善惡相生是非交蹂形彰而影附唇竭而齒寒茍有其真不能無其偽也是以厯代帝王統御家國莫不側身馳心以㳟英乂及所封授則猶是愚小莫不攘臂切齒以疾姦佞及所誅逐則謬加賢良此有識者之所嗟痛也夫山雞無靈買之者謂之鳯野麟嘉瑞傷之者謂之麕然麟鳯有圖麕雞無識猶復以真為偽以偽為真况忠逆之情静躁之性愚靖者類直智狂者類賢潔己者不能同人犯顔者短於忤主情狀無形象可見心慮非視聽所知欲使銀鉛不雜淄澠殊味其有得者亦萬代之一遇也是以吳用宰嚭致戮於子胥魯退仲尼委政於季氏秦誅白起以舉應侯趙信郭開而殺李牧卞和獻玉反遇楚刑東郭吹竽濫食齊祿若斯之類實繁有徒然則所是不必真所非不必偽也故真偽之際有數術焉不可不察也何者夫衆之所譽者不可必謂其善也衆之所毁者不可必謂其惡也我之所親者不可必謂其賢也我之所疎者不可必謂其鄙也何以明言昔堯理洪水伯鯀為衆所舉而洪水莫除魏伐中山樂羊為衆所慢而中山卒拔鄧通延夢於漢主而非傅説之才屈原見逐於楚王而無共工之罪此則衆議不必是獨見未為得也是故明主疇咨在位詳省己慮先難而後易考著以䆒徴使夫登用者不愧其賞有罪者不逃其責然後可為當矣然則良馬驗之於馳驟則駑駿可分不藉孫陽之舉也柔刅徴之於㫁割則利鈍可見不勞風胡之談也茍有難知之人試之以任事則真偽自辯以塞天下之訟也故先王之用人也逺使之而觀其忠節近使之而察其敬勤合之以謀可識其智慮煩之以務足見其材能雜之以居視以貞濫委之以和詳以貪㢘困窮要之以仁危難思之以信尋其行而探其性聽其辭而别其情盡呂尚之八徴驗臯陶之九徳然後素絲皆染白璧投泥而不渝黄葉並彫青松凌霜而獨秀則偽者去而真者得矣故孔子曰衆善者必察焉衆惡者必察焉其是之謂乎同異第九夫同聲相應同氣相求雖虎異谷風虎嘯而谷風起蛇非山霧蛇踴而山霧興理所同耳夫異類殊羣異情同行雖蛤因雀化而蛤不與雀游鴽自䑕為而鴽不與䑕匹理所異耳然父子兄弟非不親矣其心未必同君臣朋友非不疎矣其心未必異故瞽瞍愚而重華聖盗蹠貪而栁下㢘劉季困而紀信焚伯桃餓而角哀死亦猶烟灰同出飛沉自分膠漆異生而堅固相守也然則情性不等同異難并大易雖云同人於門三爻復云伏戎於莽此則於同不能無異也故有面同而心不同者有外異而内不異者有始同而終異者有初異而末同者有彼不同我而我與之同者有彼不異我而我與之異者何以明之昔者陳平面向呂后而心歸劉氏程嬰外逆孫臼而内存趙孤張耳陳餘始則刎頸之交終搆參商之隙夷吾小白初有射鈎之怨末為魚水之歡田氏懐誑義於齊君齊君彌信亞父盡至忠於項羽項羽益疑是則同異之心不可以一二而測也是故明者徐視而審聽髙居而逺望也隨時之宜唯變所適因其可同而與之同矣因其可異而與之異矣故衛青豎耳漢武委之以軍旅由余虜耳秦穆授之以國政夫以衛青由余敵於秦漢非不疎矣猶知可同而同之况於父子兄弟之親而有可同者乎且管叔兄耳姬旦誅之以極刑石厚子矣石碏死之以大義也夫以管叔石厚比於旦碏非不親矣猶知可異而異之况乎君臣朋友之疎而有可異者乎故能同異者為福不能同異者為禍虞舜能同八元能異四罪永垂聖哲之名殷紂不同三仁不異二臣故取敗亡之辱是則同異之際不可失其微妙也故孔子曰見㡬而作不俟終日其是之謂歟愛憎第十夫日之明也無幽不燭蓋之以重雲則光輝莫覩水之鑑也有来而斯應混之以糝土則影象俱滅夫以水日之明鑑失其常然者豈不以雲土之異移其性乎是則人有神智之察非不靈矣徒以内存愛尚之情外挾憎忿之事則是非得失不能不惑焉何以明之昔重華孝矣瞽瞍病之親行不義寤生賢矣武姜惡之自搆其亂鶴乃賤矣衛君重之載以華軒馬則微矣楚王好之衣以文繡夫以骨肉相親固無間矣而猶憎之禽獸類别誠有分矣而猶愛之况乎明君信臣不如父母之信子邪士媚於主巧於鶴馬之媚人而無愛憎之迷者蓋亦寡矣是故汲黯袁盎以忠諌而屢出籍孺韓嫣以佞倖而益重孫通諛言而受賞賈誼切直而見疎甚矣哉愛憎之惑人也如此若夫忠臣之事君也面諍君之惡方欲成君之美而君反以為憎己也佞人之事主也面諛主之善方欲長主之過而主反以為愛己也殊不知聞惡而遷善永為有道之君悦善而忘惡長為不義之主是則致君於有道者豈得不為大愛乎䧟主於不義者豈得不為大憎乎而主不原忠謟之情輕肆向背之志以為愛己者己亦愛之則寵光加於三族以為憎己者己亦憎之則夷滅被於五宗遂使剖心刎頸之誠棄而莫用䑛痔吮癰之類擢以殊級且夫賞以勸善名以爵賢使天下不肖者有名無功者受賞則何以勸天下乎法以禁非刑以懲惡使夫懐忠者坐法行直者遇刑則何以禁天下乎是以漢憎雍齒張良以為可封隋寵少師伯比以為可代何則有功者害適為不祥無徳是親自下闗闕兩同書卷下
