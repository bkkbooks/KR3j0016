body:
  text: 提要兩同書雜家類一雜學之屬臣等謹案兩同書二卷唐羅隠撰隠字昭諌新城人本名横以十舉不中第乃更名朱温篡唐以諫議大夫召不應仕錢鏐為錢塘令尋為鎮海軍掌書記節度判官鹽鐵發運副使授著作佐郎司勲郎中厯遷諫議大夫給事中吳越備史載隠所著有淮海寓言讒書不言有此書然淮海寓言及讒書陳振孫已訪之未獲惟此書猶傳于今凡十篇上卷五篇皆終之以老氏之言下卷五篇皆終之以孔子之言崇文總目謂以老子修身之説為内孔子治世之道為外㑹其㫖而同元然則兩同之名盖取晉人將無同之義晁公武以為取兩者同出而異名非其㫖矣書録解題引中興書目以為唐吳筠撰考宋史藝文志别有吳筠兩同書二卷與此書同載雜家類中非一書也化書雜家類一雜學之屬臣等謹案化書六卷舊本作齊邱子題南唐宋齊邱撰宋張耒跋其書遂謂齊邱犬䑕之雄葢不足道晁公武亦以齊邱所撰著於録然考宋碧虚子陳景元跋稱舊傳陳搏言譚峭景昇在終南著化書因逰三茅厯建康見齊邱有道骨因以授之曰是書之化其化無窮願子序之流於後世於是杖靸而去齊邱遂奪為己有而序之則此書為峭所撰稱齊邱子者非也書凡六篇曰道化術化徳化仁化食化儉化其説多本黄老道徳之㫖文筆亦簡勁奥質元陸友仁硯北雜志稱譚景昇書世未嘗見他書言其論書道鍾王而下一人而已今考書道一條見在仁化篇中而友仁顧未之見則元世流傳葢已罕矣峭為唐國子司業洙之子師嵩山道士得辟榖養氣之術見沈汾續仙𫝊中其説神怪不足深詰又道家稱峭為紫霄真人而五代史閩世家稱王昶好巫稱道士譚紫霄為正一先生其事與峭同時未知即為一人否方外之士行踪靡定亦無從而考核矣乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
